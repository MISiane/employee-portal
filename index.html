    <link rel="icon" type="image/png" sizes="72x72" href="/icon-72.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png" />

    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />

    <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Primary Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="description" content="Employee Portal - Manage employee information, leave requests, payslips, and announcements" />
    <meta name="keywords" content="employee portal, HR management, leave management, payslip" />
    <meta name="author" content="Le Monet Hotel" />
    <meta name="theme-color" content="#800080" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Employee Portal" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Employee Portal" />
    <meta property="og:description" content="Centralized hub for managing employee information" />
    <meta property="og:image" content="/icon-512.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Employee Portal" />

    <title>Employee Portal | Le Monet Hotel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(registration => {
          console.log('✅ Service Worker registered:', registration.scope);
        })
        .catch(error => {
          console.log('❌ Service Worker registration failed:', error);
        });
    });
  }
</script>
  </body>
</html>
